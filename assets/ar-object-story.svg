  <text x="451" y="635" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="26" font-weight="700" fill="#ffffff">敢表达</text>
  <rect x="576" y="602" width="154" height="50" rx="25" fill="#2d2522"/>
  <text x="653" y="635" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="26" font-weight="700" fill="#ffffff">有边界</text>

  <text x="450" y="698" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="28" fill="#64574f">新学期可以慢一点，也可以按自己的方式长大</text>
