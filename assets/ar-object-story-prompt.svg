  <path d="M180 402 L218 360 L256 402 L294 360 L332 402 L370 360 L408 402 L446 360 L484 402 L522 360 L560 402 L598 360 L636 402 L674 360 L712 402" fill="none" stroke="#2d2522" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
